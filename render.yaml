services:
  - type: web
    name: second-life-kids
    runtime: node
    region: singapore
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/second-life-kids run build && pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/config/tiers
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: second-life-kids-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFICATION_EMAIL
        value: secondlifekids@zero2seventeen.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false

databases:
  - name: second-life-kids-db
    databaseName: secondlifekids
    user: secondlifekids
    region: singapore
    plan: starter
